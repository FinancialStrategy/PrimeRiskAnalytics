services:
  - type: web
    name: qfa-hedge-fund-dashboard
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: panel serve app.py --address 0.0.0.0 --port $PORT --allow-websocket-origin=${RENDER_EXTERNAL_HOSTNAME} --num-procs 1 --unused-session-lifetime 30000 --check-unused-sessions 30000
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: MPLCONFIGDIR
        value: "/tmp/matplotlib"
      - key: PANEL_LOG_LEVEL
        value: "warning"
